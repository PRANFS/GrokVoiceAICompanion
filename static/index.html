<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Voice AI Companion</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23667eea'/></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- Cubism SDK for Live2D (required) -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    
    <!-- PixiJS and Live2D -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.0/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Dynamic Background Container -->
        <div id="dynamic-background"></div>
        
        <!-- Background Change Notification -->
        <div id="background-notification" class="hidden"></div>
        
        <!-- Vision Processing Indicator -->
        <div id="vision-indicator" class="hidden"></div>
        
        <!-- Live2D Canvas Container -->
        <div id="canvas-container">
            <canvas id="live2d-canvas"></canvas>
        </div>

        <!-- Model Selector -->
        <div id="model-selector" class="panel">
            <label>Select Avatar</label>
            <select id="model-dropdown">
                <option value="/static/models/kei_vowels_pro/runtime/kei_vowels_pro.model3.json">Kei Vowels Pro</option>
                <option value="/static/models/hiyori/hiyori_pro_t11.model3.json">Hiyori Momose</option>
            </select>
            <button id="load-custom-btn" class="secondary-btn">📁 Load Custom</button>
            <input type="file" id="custom-model-input" accept=".model3.json" style="display: none;">
            
            <label>Voice Language</label>
            <select id="language-dropdown">
                <option value="en">🇬🇧 English</option>
                <option value="ja">🇯🇵 Japanese (日本語)</option>
                <option value="ko">🇰🇷 Korean (한국어)</option>
                <option value="zh">🇨🇳 Chinese (中文)</option>
                <option value="es">🇪🇸 Spanish (Español)</option>
                <option value="fr">🇫🇷 French (Français)</option>
                <option value="de">🇩🇪 German (Deutsch)</option>
            </select>
            
            <button id="personality-btn" class="secondary-btn">🎭 Edit Personality</button>
            
            <label class="toggle-label">
                <input type="checkbox" id="dynamic-bg-toggle" checked>
                <span class="toggle-slider"></span>
                🖼️ Dynamic Backgrounds
            </label>
            
            <!-- Character Generator Section -->
            <div class="panel-divider"></div>
            <label>Generate Character</label>
            <div id="character-generator">
                <textarea id="char-prompt-input" rows="3" placeholder="Describe your character... e.g. 'cyberpunk girl with pink hair and neon outfit'"></textarea>
                <label class="toggle-label quality-toggle">
                    <input type="checkbox" id="high-quality-toggle" checked>
                    <span class="toggle-slider"></span>
                    🎨 Generate reference artwork (for gallery)
                </label>
                <button id="generate-char-btn" class="primary-btn">✨ Generate</button>
                <div id="gen-progress" class="hidden">
                    <div class="gen-progress-bar">
                        <div class="gen-progress-fill"></div>
                    </div>
                    <p id="gen-progress-text">Starting...</p>
                </div>
            </div>
            <button id="gallery-btn" class="secondary-btn">🖼️ Character Gallery</button>
        </div>

        <!-- Personality Editor Modal -->
        <div id="personality-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🎭 Edit Personality</h2>
                    <button id="close-modal-btn" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <label for="voice-select">Voice</label>
                    <select id="voice-select">
                        <option value="ara">Ara</option>
                        <option value="rex">Rex</option>
                        <option value="sal">Sal</option>
                        <option value="eve">Eve</option>
                        <option value="leo">Leo</option>
                    </select>
                    
                    <label for="instructions-textarea">Base Instructions</label>
                    <textarea id="instructions-textarea" rows="10" placeholder="Enter the personality instructions..."></textarea>
                </div>
                <div class="modal-footer">
                    <button id="cancel-personality-btn" class="secondary-btn">Cancel</button>
                    <button id="save-personality-btn" class="primary-btn">💾 Save</button>
                </div>
            </div>
        </div>

        <!-- Character Gallery Modal -->
        <div id="gallery-modal" class="modal hidden">
            <div class="modal-content modal-large">
                <div class="modal-header">
                    <h2>🖼️ Character Gallery</h2>
                    <button id="close-gallery-btn" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div id="gallery-grid" class="gallery-grid">
                        <!-- Populated dynamically -->
                    </div>
                    <div id="gallery-empty" class="gallery-empty hidden">
                        <p>No generated characters yet.</p>
                        <p>Use the "Generate Character" section to create your first one!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Subtitle Display (for non-English languages) -->
        <div id="subtitle-display" class="hidden">
            <p id="subtitle-text"></p>
        </div>

        <!-- Transcript Panel -->
        <div id="transcript-panel" class="panel hidden">
            <div id="transcript-content"></div>
        </div>

        <!-- Controls Panel -->
        <div id="controls-panel" class="panel">
            <div id="status-indicator">
                <div id="status-dot" class="disconnected"></div>
                <span id="status-text">Click microphone to start</span>
            </div>
            
            <div id="volume-indicator">
                <div class="volume-bar"></div>
                <div class="volume-bar"></div>
                <div class="volume-bar"></div>
                <div class="volume-bar"></div>
                <div class="volume-bar"></div>
            </div>
            
            <button id="mic-button" class="inactive" title="Start Conversation">
                🎙️
            </button>
        </div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="hidden">
            <div class="spinner"></div>
            <p>Loading avatar...</p>
        </div>

        <!-- Error Toast -->
        <div id="error-toast" class="hidden"></div>
    </div>

    <!-- Application Scripts -->
    <script src="/static/js/live2d-avatar.js"></script>
    <script src="/static/js/websocket-client.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
